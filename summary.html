<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>配達日報 サマリー | 栄ガーデン</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');
:root{
  --ink:#1a1a2e; --paper:#faf8f3; --accent:#c0392b; --rule:#d4c9b0; --light:#f0ebe0;
  --green:#27ae60; --blue:#2980b9; --brown:#795548; --purple:#7b1fa2; --orange:#e65100;
  --yellow-bg:#fffde7; --yellow-bd:#f9a825; --yellow-lbl:#f57f17;
  --cyan:#0097a7; --cyan-bg:#e0f7fa;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:#e8e0d0;min-height:100vh;padding:12px;color:var(--ink)}
.topbar{background:var(--ink);color:#fff;padding:14px 16px 10px;border-radius:10px 10px 0 0;margin-bottom:0;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.topbar h1{font-size:17px;letter-spacing:.08em;font-weight:700}
.topbar select{font-family:inherit;font-size:14px;padding:6px 10px;border:none;border-radius:6px;background:#fff;color:var(--ink);cursor:pointer}
.route-tabs{display:flex;gap:6px;background:var(--ink);padding:0 16px 12px;border-radius:0 0 10px 10px;margin-bottom:14px}
.rtab{flex:1;padding:7px 4px;background:rgba(255,255,255,.1);color:rgba(255,255,255,.6);border:none;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;border-radius:8px;transition:all .15s}
.rtab.active{background:#fff;color:var(--ink)}
#loading{text-align:center;padding:50px 0;color:#888;font-size:14px}
.spinner{display:inline-block;width:30px;height:30px;border:3px solid #ccc;border-top-color:var(--ink);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:10px}
@keyframes spin{to{transform:rotate(360deg)}}
#error{display:none;text-align:center;padding:40px;color:var(--accent);font-size:14px}
#report{display:none}
.rhdr{background:var(--paper);border:2px solid var(--ink);border-radius:10px 10px 0 0;padding:14px 16px 10px;display:flex;justify-content:space-between;align-items:flex-end;border-bottom:3px double var(--ink)}
.rhdr-l h2{font-size:20px;letter-spacing:.12em;color:var(--accent)}
.rhdr-l p{font-size:11px;color:#888;margin-top:3px}
.rhdr-r{text-align:right;font-size:12px;color:#555}
.rhdr-r .dbig{font-size:17px;font-weight:bold;color:var(--ink)}
.ssec{background:var(--paper);border:1px solid var(--rule);border-top:none}
.ssec:last-child{border-radius:0 0 10px 10px}
.shdr{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;border-bottom:1px solid var(--rule);background:var(--light)}
.sname{font-size:14px;font-weight:bold;letter-spacing:.04em}
.sname.yaoko{color:var(--accent)}.sname.choku{color:var(--green)}.sname.others{color:var(--blue)}
.sstaff{font-size:11px;color:#888}
.nodata{padding:10px 14px;font-size:12px;color:#aaa;font-style:italic;border-bottom:1px dashed var(--rule)}
.ts-row{padding:5px 14px;font-size:11px;color:#888;background:#f9f7f2;border-bottom:1px solid var(--rule)}

/* 店頭在庫テーブル */
.inv-wrap{padding:10px 12px 6px}
.inv-table{width:100%;border-collapse:collapse;font-size:13px}
.inv-table th{padding:5px 6px;background:var(--light);font-size:10px;font-weight:700;color:#666;letter-spacing:.06em;text-align:center;border-bottom:2px solid var(--rule)}
.inv-table th:first-child{text-align:left}
.inv-table td{padding:6px 6px;border-bottom:1px dotted #e0d9cc;text-align:center;vertical-align:middle}
.inv-table td:first-child{text-align:left;font-size:12px;color:#555;white-space:nowrap}
.inv-table tr:last-child td{border-bottom:none}
.iv{font-size:15px;font-weight:700}
.iv-chin{color:var(--yellow-lbl)}
.iv-sosei{color:var(--purple)}
.iv-tenpo{color:var(--cyan)}
.iv-zan{color:var(--green)}
.iv-total{background:var(--yellow-bg);font-weight:700;border-top:2px solid var(--yellow-bd)!important}
.iv-sales{font-size:15px;font-weight:700;color:#c0392b}

/* 詳細アコーディオン */
.dtoggle{display:flex;align-items:center;gap:6px;padding:8px 14px;cursor:pointer;border-top:1px solid var(--rule);border-bottom:1px solid var(--rule);background:#f5f3ee;font-size:11px;font-weight:700;color:#777;letter-spacing:.08em;user-select:none}
.dtoggle .tri{display:inline-block;transition:transform .2s;font-size:9px}
.dtoggle.open .tri{transform:rotate(90deg)}
.dbody{display:none}
.dbody.open{display:block}
.dsec-hdr{padding:6px 14px;font-size:10px;font-weight:700;letter-spacing:.08em;border-bottom:1px solid var(--rule)}
.dsec-hdr.green{background:#edf7f1;color:var(--green)}.dsec-hdr.blue{background:#e8f0fb;color:var(--blue)}
.dsec-hdr.brown{background:#f5ede4;color:var(--brown)}.dsec-hdr.purple{background:#f3e5f5;color:var(--purple)}
.dsec-hdr.yellow{background:var(--yellow-bg);color:var(--yellow-lbl)}.dsec-hdr.gray{background:#f5f5f5;color:#666}
.drow{display:flex;align-items:center;padding:6px 14px;border-bottom:1px dotted #e0d9cc;font-size:12px}
.drow:last-child{border-bottom:none}.dlbl{flex:1;color:#666}
.dval{font-size:14px;font-weight:700;min-width:40px;text-align:right;color:var(--ink)}
.dunit{font-size:10px;color:#999;margin-left:3px}
.tokki-txt{font-size:12px;color:#444;padding:7px 14px;font-style:italic;border-bottom:1px dotted #e0d9cc}
.footer{text-align:center;padding:14px;font-size:11px;color:#aaa}
</style>
</head>
<body>
<div class="topbar">
  <h1>🍄 配達日報サマリー</h1>
  <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
    <a href="index.html" style="font-size:12px;color:rgba(255,255,255,.7);text-decoration:none">← 日報入力に戻る</a>
    <select id="dateSelect" onchange="showReport(this.value)" disabled>
      <option value="">読み込み中...</option>
    </select>
  </div>
</div>
<div class="route-tabs">
  <button class="rtab active" id="rtab0" onclick="switchRoute(0)">小川ルート</button>
  <button class="rtab" id="rtab1" onclick="switchRoute(1)">籠原ルート</button>
  <button class="rtab" id="rtab2" onclick="switchRoute(2)">坂戸ルート</button>
</div>
<div id="loading"><div class="spinner"></div><br>データを読み込んでいます...<br><small>初回のみ時間がかかります</small></div>
<div id="error">データの取得に失敗しました。<br>しばらく待ってから再度お試しください。</div>
<div id="report"></div>
<div class="footer">栄ガーデン 配達日報システム</div>

<script>
var API_URL='https://script.google.com/macros/s/AKfycbxGqsjIbO9PDjUpf2EWRD8AkVvYc7V77OJrh7h_PZCqtuV4aUL7NYz83VsNc5lY6sXONw/exec';
var CACHED=null, currentRoute=0;

var ROUTE_GROUPS=[
  {label:'小川ルート',stores:[
    {name:'ヤオコー寄居店',                  cls:'yaoko',  sub:'河野さん・竹山さん', type:'yaoko', prices:['¥99','¥198','¥398','¥598']},
    {name:'ヤオコーみどりが丘店',            cls:'yaoko',  sub:'杉田さん・川野さん', type:'yaoko', prices:['¥99','¥198','¥398','¥598']},
    {name:'男衾農産物直売所',                cls:'choku',  sub:'', type:'choku', prices:['¥180','¥200','¥380','¥540']},
    {name:'川本農産物直売所',                cls:'choku',  sub:'', type:'choku', prices:['¥180','¥200','¥380','¥540']},
    {name:'ハーズ',                          cls:'others', sub:'五十嵐さん・加藤さん', type:'oroshi', prices:['¥315','¥158']},
    {name:'深谷ベジタブルコミュニケーション', cls:'others', sub:'田島さん', type:'oroshi', prices:['¥95（姫）','¥95（小）','¥350','レストラン用'], units:{'レストラン用':'kg'}},
    {name:'たまや',                          cls:'choku',  sub:'', type:'choku', prices:['¥220（税込）','¥450（税込）']},
    {name:'農林公園',                        cls:'choku',  sub:'', type:'choku', prices:['¥180','¥200','¥380','¥500']},
    {name:'道の駅おがわまち',                cls:'choku',  sub:'', type:'choku', prices:['¥210','¥420']},
  ]},
  {label:'籠原ルート',stores:[
    {name:'ヤオコー皆野店',         cls:'yaoko',sub:'',type:'yaoko',prices:['¥99','¥198','¥398','¥598']},
    {name:'ヤオコー籠原店',         cls:'yaoko',sub:'',type:'yaoko',prices:['¥99','¥198','¥398','¥598']},
    {name:'道の駅おかべ',           cls:'choku',sub:'',type:'choku',prices:['¥200','¥216','¥380','¥420']},
    {name:'ヤオコー本庄中央店',     cls:'yaoko',sub:'',type:'yaoko',prices:['¥99','¥198','¥398','¥598']},
    {name:'ヤオコー上里店',         cls:'yaoko',sub:'',type:'yaoko',prices:['¥99','¥198','¥398','¥598']},
    {name:'ヤオコー児玉バイパス店', cls:'yaoko',sub:'',type:'yaoko',prices:['¥99','¥198','¥398','¥598']},
  ]},
  {label:'坂戸ルート',stores:[
    {name:'ヤオコー坂戸泉店',        cls:'yaoko',sub:'',type:'yaoko',prices:['¥99','¥198','¥398','¥598']},
    {name:'ヤオコー坂戸千代田店',    cls:'yaoko',sub:'',type:'yaoko',prices:['¥99','¥198','¥398','¥598']},
    {name:'ヤオコーワカバウォーク店', cls:'yaoko',sub:'',type:'yaoko',prices:['¥99','¥198','¥398','¥598']},
    {name:'ヤオコー一本松南店',      cls:'yaoko',sub:'',type:'yaoko',prices:['¥99','¥198','¥398','¥598']},
    {name:'ヤオコー長瀬店',          cls:'yaoko',sub:'',type:'yaoko',prices:['¥99','¥198','¥398','¥598']},
  ]}
];
var STORES=[]; ROUTE_GROUPS.forEach(function(g){STORES=STORES.concat(g.stores);});

var SP=[
  {keys:['納品'],        id:'nouhin',  label:'🟩 納品数',           color:'green'},
  {keys:['S品','在庫S'], id:'zaikoS',  label:'🟦 S品陳列数（当日）', color:'blue'},
  {keys:['A品','在庫A'], id:'zaikoA',  label:'🟫 A品陳列数（1日前）',color:'brown'},
  {keys:['B品','在庫B'], id:'zaikoB',  label:'🟫 B品陳列数（2日前）',color:'brown'},
  {keys:['C品','在庫C'], id:'zaikoC',  label:'🟫 C品陳列数（3日前）',color:'brown'},
  {keys:['前日在庫'],    id:'zenjitsu',label:'🟫 前日在庫',          color:'brown'},
  {keys:['蘇生庫'],      id:'sosei',   label:'🟪 蘇生庫へ',          color:'purple'},
  {keys:['値引き'],      id:'nebiki',  label:'🟥 値引き',            color:'yellow'},
  {keys:['持ち帰り'],    id:'mochikae',label:'🟧 持ち帰り',          color:'yellow'},
  {keys:['特記事項'],    id:'tokki',   label:'📝 特記事項',          color:'gray'},
];
var YD=['nouhin','zaikoS','zaikoA','zaikoB','zaikoC','sosei','nebiki','mochikae','tokki'];
var CD=['nouhin','zenjitsu','mochikae','tokki'];
var OD=['nouhin','tokki'];

var cbIdx=0;
function jsonp(url,ok,err){
  var cb='c'+(cbIdx++),s=document.createElement('script');
  var t=setTimeout(function(){cl();if(err)err();},15000);
  function cl(){clearTimeout(t);delete window[cb];if(s.parentNode)s.parentNode.removeChild(s);}
  window[cb]=function(d){cl();ok(d);};
  s.onerror=function(){cl();if(err)err();};
  s.src=url+(url.indexOf('?')>-1?'&':'?')+'callback='+cb;
  document.body.appendChild(s);
}

function switchRoute(i){
  currentRoute=i;
  for(var j=0;j<3;j++) document.getElementById('rtab'+j).classList.toggle('active',j===i);
  var d=document.getElementById('dateSelect').value;
  if(d&&CACHED&&CACHED[d]) render(d,CACHED[d]);
}

window.onload=function(){
  jsonp(API_URL+'?action=getAllData',function(data){
    CACHED=data.allData;
    document.getElementById('loading').style.display='none';
    var sel=document.getElementById('dateSelect');
    sel.innerHTML='<option value="">-- 日付を選択 --</option>';
    sel.disabled=false;
    (data.availableDates||[]).forEach(function(d){
      var o=document.createElement('option'),p=d.split('-'),days=['日','月','火','水','木','金','土'];
      o.value=d;o.textContent=p[0]+'年'+parseInt(p[1])+'月'+parseInt(p[2])+'日（'+days[new Date(d+'T00:00:00').getDay()]+'）';
      sel.appendChild(o);
    });
    if(!data.availableDates||!data.availableDates.length) sel.innerHTML='<option value="">データがありません</option>';
  },function(){document.getElementById('loading').style.display='none';document.getElementById('error').style.display='block';});
};

function showReport(date){
  if(!date||!CACHED) return;
  render(date, CACHED[date]||{});
}

function parseSecs(sd){
  var secs={};
  sd.items.forEach(function(it){
    for(var i=0;i<SP.length;i++){
      var pat=SP[i];
      if(pat.keys.some(function(k){return it.label.indexOf(k)>-1;})){
        if(!secs[pat.id]) secs[pat.id]={label:pat.label,color:pat.color,id:pat.id,items:[]};
        secs[pat.id].items.push(it);break;
      }
    }
  });
  return secs;
}

function getRaw(sec,price){
  if(!sec) return 0;
  var t=0;sec.items.forEach(function(it){if(it.label.indexOf(price)>-1)t+=parseInt(it.value)||0;});
  return t;
}

function getChin(secs,prices,isYaoko){
  var r={};
  prices.forEach(function(p){
    r[p]=isYaoko
      ?(getRaw(secs.zaikoS,p)+getRaw(secs.zaikoA,p)+getRaw(secs.zaikoB,p)+getRaw(secs.zaikoC,p))
      :(getRaw(secs.nouhin,p)+getRaw(secs.zenjitsu,p));
  });
  return r;
}

function eId(s){return String(s).replace(/[^a-zA-Z0-9]/g,'_');}
function eA(s){return String(s||'').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function eH(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function render(date,dayData){
  var p=date.split('-'),days=['日','月','火','水','木','金','土'];
  var ds=p[0]+'年'+parseInt(p[1])+'月'+parseInt(p[2])+'日（'+days[new Date(date+'T00:00:00').getDay()]+'）';
  var rs=ROUTE_GROUPS[currentRoute].stores,staff='';
  rs.forEach(function(s){if(!staff&&dayData[s.name]&&dayData[s.name].担当者)staff=dayData[s.name].担当者;});

  var html='<div class="rhdr"><div class="rhdr-l"><h2>配 達 日 報</h2><p>'+ROUTE_GROUPS[currentRoute].label+'</p></div>';
  html+='<div class="rhdr-r"><div class="dbig">'+ds+'</div><div>担当：'+(staff||'―')+'</div></div></div>';

  rs.forEach(function(store){
    html+='<div class="ssec"><div class="shdr"><span class="sname '+store.cls+'">■ '+store.name+'</span>';
    if(store.sub) html+='<span class="sstaff">'+store.sub+'</span>';
    html+='</div>';
    var sd=dayData[store.name];
    if(!sd||!sd.items||!sd.items.length){html+='<div class="nodata">本日訪問なし / データなし</div></div>';return;}
    if(sd.timestamp) html+='<div class="ts-row">🕐 最終更新：'+sd.timestamp+'</div>';

    var isY=store.type==='yaoko', isC=store.type==='choku', isO=store.type==='oroshi';
    var secs=parseSecs(sd);

    if(isO){
      html+=renderOroshi(store,secs);
    } else {
      html+=renderInvTable(store,secs,isY,sd.items);
      html+=renderAccordion(store,secs,isY);
    }
    html+='</div>';
  });

  document.getElementById('report').innerHTML=html;
  document.getElementById('report').style.display='block';
}

function renderInvTable(store,secs,isY,items){
  var prices=store.prices,sn=store.name;
  var chin=getChin(secs,prices,isY);
  var tc=0,ts=0,tt=0,totalZan=0,hasAnySales=false;

  var html='<div class="inv-wrap"><table class="inv-table"><thead><tr>';
  html+='<th>価格</th><th>陳列数</th>';
  if(isY) html+='<th>蘇生庫</th>';
  html+='<th>店頭在庫</th><th>販売数</th><th>残在庫</th></tr></thead><tbody>';

  prices.forEach(function(p){
    var c=chin[p]||0;
    var sv=isY?(getRaw(secs.sosei,p)||0):0;
    var tenpo=c+sv;
    tc+=c;ts+=sv;tt+=tenpo;

    // items から「販売数_¥99」等のラベルを直接検索
    var salesVal='';
    if(items){
      items.forEach(function(it){
        if(it.label==='販売数_'+p && it.value!=='' && it.value!==null && it.value!==undefined){
          salesVal=String(it.value);
        }
      });
    }

    var zan=salesVal!==''?Math.max(tenpo-(parseInt(salesVal)||0),0):'';
    if(salesVal!==''){hasAnySales=true;totalZan+=zan;}
    else totalZan+=tenpo;

    html+='<tr><td>'+eH(p)+'</td>';
    html+='<td><span class="iv iv-chin">'+c+'</span></td>';
    if(isY) html+='<td><span class="iv iv-sosei">'+sv+'</span></td>';
    html+='<td><span class="iv iv-tenpo">'+tenpo+'</span></td>';
    html+='<td><span class="iv iv-sales">'+eH(salesVal!==''?salesVal:'-')+'</span></td>';
    html+='<td><span class="iv iv-zan">'+(zan===''?'-':zan)+'</span></td></tr>';
  });

  // 合計行
  html+='<tr class="iv-total"><td>合計</td><td><span class="iv iv-chin">'+tc+'</span></td>';
  if(isY) html+='<td><span class="iv iv-sosei">'+ts+'</span></td>';
  html+='<td><span class="iv iv-tenpo">'+tt+'</span></td><td></td>';
  html+='<td><span class="iv iv-zan">'+(hasAnySales?String(totalZan):'-')+'</span></td></tr>';

  html+='</tbody></table></div>';
  return html;
}


function renderAccordion(store,secs,isY){
  var detail=isY?YD:CD;
  var id=eId(store.name);
  var html='<div class="dtoggle" id="dt_'+id+'" onclick="togD(\''+id+'\')"><span class="tri">▶</span>詳細データ</div>';
  html+='<div class="dbody" id="db_'+id+'">';
  detail.forEach(function(did){
    if(!secs[did]) return;
    var sec=secs[did];
    html+='<div><div class="dsec-hdr '+sec.color+'">'+sec.label+'</div>';
    if(did==='tokki'){
      sec.items.forEach(function(it){html+='<div class="tokki-txt">'+eH(it.value||'―')+'</div>';});
    } else {
      sec.items.forEach(function(it){
        var lbl=it.label.replace(/納品\s?/,'').replace(/[SABC]品\s?/,'').replace(/在庫[SABC]\s?/,'')
          .replace(/前日在庫\s?/,'').replace(/蘇生庫\s?/,'').replace(/値引き\s?/,'')
          .replace(/持ち帰り\s?/,'').replace('（個）','').replace(/^_/,'');
        html+='<div class="drow"><span class="dlbl">'+eH(lbl)+'</span><span class="dval">'+eH(it.value)+'</span><span class="dunit">個</span></div>';
      });
    }
    html+='</div>';
  });
  html+='</div>';
  return html;
}

function togD(id){
  var t=document.getElementById('dt_'+id),b=document.getElementById('db_'+id);
  if(!t||!b) return;
  var o=b.classList.contains('open');
  b.classList.toggle('open',!o);t.classList.toggle('open',!o);
}

function renderOroshi(store,secs){
  var html='<div>';
  OD.forEach(function(did){
    if(!secs[did]) return;
    var sec=secs[did];
    html+='<div><div class="dsec-hdr '+sec.color+'">'+sec.label+'</div>';
    if(did==='tokki'){
      sec.items.forEach(function(it){html+='<div class="tokki-txt">'+eH(it.value||'―')+'</div>';});
    } else {
      sec.items.forEach(function(it){
        var lbl=it.label.replace(/納品\s?/,'').replace('（個）','').replace(/^_/,'');
        var unit=(store.units&&store.units[lbl])?store.units[lbl]:'個';
        html+='<div class="drow"><span class="dlbl">'+eH(lbl)+'</span><span class="dval">'+eH(it.value)+'</span><span class="dunit">'+unit+'</span></div>';
      });
    }
    html+='</div>';
  });
  html+='</div>';
  return html;
}
</script>
</body>
</html>
